name: Update Schedule

on:
  schedule:
    # 每天凌晨2点自动更新
    - cron: '0 2 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update-schedule:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch schedule from HDU API
        env:
          STAFF_ID: ${{ secrets.STAFF_ID }}
        run: |
          # 如果没有设置STAFF_ID，使用默认的staffId
          STAFF_ID=${STAFF_ID:-QrSIjTjegpeEPC2Ng13uPA==}
          
          echo "Fetching schedule with staffId: $STAFF_ID"
          curl -s "https://api.hduhelp.com/calendar/schedule?staffId=$STAFF_ID" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Accept: text/calendar" \
            -o schedule.ics
          
          # 检查文件是否成功获取
          if [ -s schedule.ics ]; then
            echo "Schedule fetched successfully"
            head -n 5 schedule.ics
          else
            echo "Failed to fetch schedule"
            exit 1
          fi

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Merge schedules
        run: |
          # 合并课表和自定义日程
          node scripts/merge-schedule.js

      - name: Commit and push merged schedule
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add schedule.ics merged-schedule.ics custom-events.json
          
          # 检查是否有变更，没有则跳过
          if git diff --staged --quiet; then
            echo "No changes to commit, skipping push"
            exit 0
          fi
          
          git commit -m "Update schedule $(date +'%Y-%m-%d')"
          
          # 拉取最新远程变更并变基，避免分支分歧
          git pull --rebase --autostash origin main 2>/dev/null || true
          
          # 推送（GITHUB_TOKEN 由 actions/checkout 自动持久化）
          git push origin main

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          force_orphan: true
          keep_files: false
